<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - EcoTwin</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #020604;
      --color-green-light: #34d399;
      --text-secondary: #94a3b8;
    }
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: #fff;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
    }
    /* Glow Blob */
    body::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(52, 211, 153, 0.08) 0%, transparent 70%);
      filter: blur(80px);
      z-index: 1;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .card {
      position: relative;
      z-index: 2;
      background: rgba(10, 25, 17, 0.45);
      border: 1px solid rgba(52, 211, 153, 0.15);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 24px;
      padding: 3.5rem 2.5rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
    }
    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 5rem;
      margin: 0;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--color-green-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      margin: 1rem 0 0.5rem;
    }
    p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .btn {
      display: inline-block;
      background: var(--color-green-light);
      color: #020604;
      text-decoration: none;
      padding: 0.85rem 2.2rem;
      font-weight: 700;
      border-radius: 30px;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 10px 25px rgba(52, 211, 153, 0.3);
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(52, 211, 153, 0.5);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>404</h1>
    <h2>This Page Has Evaporated</h2>
    <p>Just like glacial ice caps, the page you are looking for has disappeared into thin air. Let's redirect our energy back to tracking our footprint.</p>
    <a href="index.html" class="btn">Return Home</a>
  </div>
</body>
</html>
